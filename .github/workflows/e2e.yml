name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sub_based_internet
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sub_based_internet

      - name: Run migrations
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sub_based_internet

      - name: Seed database
        run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sub_based_internet

      - name: Build packages
        run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sub_based_internet
          REDIS_URL: redis://localhost:6379

      - name: Start API
        run: |
          node apps/api/dist/main.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sub_based_internet
          REDIS_URL: redis://localhost:6379
          API_PORT: 3001
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          WEB_URL: http://localhost:3000

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          API_URL: http://localhost:3001
          GATEWAY_KEY: dev-gateway-key-downtown
